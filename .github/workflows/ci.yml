name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-audit and cargo-deny
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Run cargo-audit
        run: cargo audit

      - name: Run cargo-deny
        run: cargo deny check --config deny.toml advisories bans sources

  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev

      - name: Check layer boundaries
        run: make check-layers

      - name: Check API docs sync
        run: make check-doc-contracts

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint hardening (domain + host-bridge, non-test targets)
        run: >-
          cargo clippy --no-deps
          -p fs25_auto_drive_engine
          -p fs25_auto_drive_host_bridge
          -p fs25_auto_drive_host_bridge_ffi
          --lib
          --
          -W clippy::unwrap_used
          -W clippy::expect_used
          -W clippy::panic
          -W clippy::todo

      - name: Todo gate (domain + host-bridge, non-test targets)
        run: ./scripts/check_todo_gate.sh

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --release

      - name: Cleanup release artifacts
        run: cargo clean --release

      - name: Test
        run: cargo test --workspace
