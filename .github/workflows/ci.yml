name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev

      - name: Check layer boundaries
        run: make check-layers

      - name: Check API docs sync
        run: make check-doc-contracts

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (Linux target)
        run: cargo clippy --workspace --all-targets --target x86_64-unknown-linux-gnu -- -D warnings

      - name: Install Windows target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Clippy (Windows target)
        run: cargo clippy --workspace --all-targets --target x86_64-pc-windows-gnu -- -D warnings

      - name: Build
        run: cargo build --workspace --release

      - name: Cleanup release artifacts
        run: cargo clean --release

      - name: Test
        run: cargo test --workspace
