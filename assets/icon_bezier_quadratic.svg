<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><defs>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1" />
    </radialGradient>
  </defs>
  <!-- Quadratic bezier curve -->
  <path d="M10 50 Q16 16 54 16" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Endpoints -->
  <circle  cx="10" cy="50" r="5"  fill="url(#ringGlow)" stroke="none" />
  <circle  cx="54" cy="16" r="5"  fill="url(#ringGlow)" stroke="none" />
  <!-- Control point -->
  <line x1="10" y1="50" x2="16" y2="16" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4"/>
  <line x1="16" y1="16" x2="54" y2="16" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4"/>
  <rect x="12" y="12" width="8" height="8" fill="#ffffff"/>
</svg>