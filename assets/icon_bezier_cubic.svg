<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><defs>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1" />
    </radialGradient>
  </defs>
  <!-- Cubic bezier curve -->
  <path d="M10 50 C12 20, 52 44, 54 14" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Endpoints -->
  <circle  cx="10" cy="50" r="5" fill="url(#ringGlow)" stroke="none" />
  <circle  cx="54" cy="14" r="5" fill="url(#ringGlow)" stroke="none" />
  <!-- Control points -->
  <line x1="10" y1="50" x2="12" y2="20" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4"/>
  <line x1="54" y1="14" x2="52" y2="44" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4"/>
  <rect x="8" y="16" width="8" height="8" fill="#ffffff"/>
  <rect x="48" y="40" width="8" height="8" fill="#ffffff"/>
</svg>